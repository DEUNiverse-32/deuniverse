<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝒟ℰ𝒰𝒩𝒾𝓋𝑒𝓇𝓈𝑒</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff3f7;
      color: #111;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
      padding-bottom: 16px;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
    }

    nav a {
      margin-left: 14px;
      font-size: 0.9rem;
      color: #555;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 50px;
    }

    .post-item {
      padding: 16px 18px;
      border: 1px solid #e2e2e2;
      border-radius: 10px;
      background: #fff;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .post-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,.05);
    }

    .post-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .post-desc {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.6;
    }

    .tools a {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #333;
    }

    .tools a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 80px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="wrap">

    <header>
      <h1><a href="./">deuniverse</a></h1>
      <nav>
        <a href="./">home</a>
        <a href="report.html">보고서</a>
        <a href="side-dialogue.html">대화 기록</a>
      </nav>
    </header>

    <main>
      <section>
        <div class="section-title">𝐼𝑁𝐷𝐸𝑋</div>
        <div class="tools">
          → <a href="report.html">ʀᴇᴘᴏʀᴛ</a>
          → <a href="side-dialogue.html">좌우 대화 변환기</a>
        </div>
      </section>
    </main>

    <footer>
      ᴅᴇᴜɴɪᴠᴇʀꜱᴇ
    </footer>

  </div>
</body>
</html>
